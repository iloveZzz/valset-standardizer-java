spring:
  application:
    name: valset-standardizer
  datasource:
    primary:
      url: jdbc:mysql://127.0.0.1:3308/t_datamiddle_subject?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
  liquibase:
    enabled: ${LIQUIBASE_ENABLED:true}
    change-log: ${LIQUIBASE_CHANGE_LOG:classpath:/db/changelog/db.changelog-master.xml}
  profiles:
    active: nacos
  data:
    redis:
      client-type: jedis
      host: localhost
      port: 30644
      jedis:
        pool:
          enabled: true

db-scheduler:
  enabled: true
  threads: 30
  polling-interval: 10s
  heartbeat-interval: 5m
  missed-heartbeats-limit: 6
  table-name: scheduled_tasks
  immediate-execution-enabled: true
  delay-startup-until-context-ready: false
  shutdown-max-wait: 30m
  always-persist-timestamp-in-utc: true

server:
  port: 30066

yss:
  mybatis:
    mapper-scan: com.yss.valset.extract.repository.mapper

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://127.0.0.1:4318/v1/traces}

mybatis-plus:
  mapper-locations: classpath*:/mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

logging:
  level:
    com.yss.datamiddle.approval: INFO
    org.springframework.jdbc: INFO
    io.opentelemetry: INFO
    io.micrometer.tracing: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-},spanId=%X{spanId:-}] %logger{36} - %msg%n"

subject:
  match:
    parse-queue-observer:
      # 是否启用待解析事件观察者
      enabled: true
      # 每次轮询最多处理多少条待解析事件
      batch-size: ${PARSE_QUEUE_OBSERVER_BATCH_SIZE:10}
      # 定时轮询的固定间隔，单位毫秒
      fixed-delay-ms: ${PARSE_QUEUE_OBSERVER_FIXED_DELAY_MS:3000}
      # 订阅待解析事件时写入的观察者名称
      subscriber-name: ${PARSE_QUEUE_OBSERVER_SUBSCRIBER_NAME:估值表文件解析处理器}
      # 启动后首次轮询前的随机抖动上限，单位毫秒
      startup-jitter-ms: ${PARSE_QUEUE_OBSERVER_STARTUP_JITTER_MS:3000}
      # 每处理完一批待解析事件后的暂停时长，单位毫秒
      batch-pause-ms: ${PARSE_QUEUE_OBSERVER_BATCH_PAUSE_MS:200}
    transfer:
      # 传输链路加密密钥
      crypto:
        secret-key: ${TRANSFER_CRYPTO_SECRET_KEY:valset-standardizer-transfer-secret-v1}
    filesys:
      # 文件系统父目录标识
      parent-id: ${FILESYS_PARENT_ID:283e6c2a0fcf4b1488db5856ad074806}
      # 文件系统存储配置标识
      storage-setting-id: ${FILESYS_STORAGE_SETTING_ID:9a4350d87d4b4085a5fa1a4e8038e09d}
      # 单次分片大小，单位字节
      chunk-size: ${FILESYS_CHUNK_SIZE:102400000}
    # 标准化输出目录
    output-dir: output
    # 本地上传临时目录
    upload-dir: ${user.home}/.tmp/valset-standardizer/uploads
    workflow:
      # 是否跳过 Excel 样式解析
      skip-excel-style-parsing: false
      # 是否启用匹配流程
      enable-match-process: false
      # 是否持久化标准化后的 DWD 明细
      persist-standardized-dwd-details: false
    outsourced-task:
      # 估值表解析任务阶段配置
      # 未命中的解析生命周期阶段默认归入哪个阶段
      parse-fallback-stage: FILE_PARSE
      # 未命中的工作流任务类型默认归入哪个阶段
      workflow-fallback-stage: DATA_PROCESSING
      # 不参与阶段归档展示的解析生命周期阶段
      ignored-parse-lifecycle-stages:
        - CYCLE_STARTED
        - CYCLE_FINISHED
        - BATCH_STARTED
        - BATCH_EMPTY
        - BATCH_FINISHED
      # 不参与阶段归档展示的工作流任务类型
      ignored-workflow-task-types:
        - PARSE_WORKBOOK
      # 工作流任务状态归入已完成的状态
      success-task-statuses:
        - SUCCESS
      # 工作流任务状态归入失败的状态
      failed-task-statuses:
        - FAILED
      # 工作流任务状态归入停止的状态
      stopped-task-statuses:
        - CANCELED
      # 工作流任务状态归入进行中的状态
      running-task-statuses:
        - RUNNING
        - RETRYING
      # 解析生命周期阶段归入进行中的状态
      parse-running-lifecycle-stages:
        - TASK_EXECUTION_STARTED
        - TASK_CREATED
        - TASK_DISPATCHED
        - QUEUE_SUBSCRIBED
      # 解析生命周期阶段归入已完成的状态
      parse-success-lifecycle-stages:
        - TASK_RAW_PARSED
        - TASK_STANDARDIZED
        - TASK_PERSISTED
        - TASK_SUCCEEDED
        - QUEUE_COMPLETED
        - TASK_REUSED
      # 解析生命周期阶段归入停止的状态
      parse-stopped-lifecycle-stages:
        - QUEUE_SKIPPED
        - QUEUE_SUBSCRIBE_CONFLICT
        - QUEUE_SUBSCRIBE_SKIPPED
      # 页面状态标签配置
      statuses:
        - status: PENDING
          label: 待处理
        - status: RUNNING
          label: 处理中
        - status: SUCCESS
          label: 已完成
        - status: FAILED
          label: 失败
        - status: STOPPED
          label: 已停止
        - status: BLOCKED
          label: 阻塞
      stages:
        - stage: FILE_PARSE
          step: FILE_PARSE
          stage-name: 文件解析
          step-name: 文件解析
          stage-description: 文件识别、Sheet 解析、结构化解析
          step-description: 文件识别、Sheet 解析、结构化解析
          task-types:
            - EXTRACT_DATA
          task-stages:
            - EXTRACT
        - stage: STRUCTURE_STANDARDIZE
          step: STRUCTURE_STANDARDIZE
          stage-name: 结构标准化
          step-name: 结构标准化
          stage-description: 字段映射、数据清洗、STG 结构转换
          step-description: 字段映射、数据清洗、STG 结构转换
          task-stages:
            - STANDARDIZE
          parse-lifecycle-stages:
            - TASK_STANDARDIZED
        - stage: SUBJECT_RECOGNIZE
          step: SUBJECT_RECOGNIZE
          stage-name: 科目识别
          step-name: 科目识别
          stage-description: 科目匹配、属性识别、标签补全
          step-description: 科目匹配、属性识别、标签补全
          task-types:
            - MATCH_SUBJECT
          task-stages:
            - MATCH
        - stage: STANDARD_LANDING
          step: STANDARD_LANDING
          stage-name: 标准表落地
          step-name: 标准表落地
          stage-description: STG/DWD/标准持仓/估值数据写入
          step-description: STG/DWD/标准持仓/估值数据写入
          parse-lifecycle-stages:
            - TASK_PERSISTED
        - stage: VERIFY_ARCHIVE
          step: VERIFY_ARCHIVE
          stage-name: 校验归档
          step-name: 校验归档
          stage-description: 一致性校验、结果确认、归档完成
          step-description: 一致性校验、结果确认、归档完成
          task-types:
            - EXPORT_RESULT
          parse-lifecycle-stages:
            - TASK_SUCCEEDED
            - QUEUE_COMPLETED
    run-log-cleanup:
      # 运行日志清理定时表达式
      cron: ${TRANSFER_RUN_LOG_CLEANUP_CRON:0 0 23 * * ?}
